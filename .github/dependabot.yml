version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Wait 7 days after a version is published before opening an update PR, so a
    # compromised release has time to be detected and yanked before we pull it
    # in (supply-chain exposure reduction).
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group minor and patch bumps into one PR per dependency type. Major bumps
    # outside a version-locked family match no group and are raised as individual
    # PRs, since they are the most likely to need a code change and warrant
    # isolated review.
    groups:
      # Version-locked families — sets of packages that ship on a shared version
      # line, so bumping one without the rest breaks the build. Listed first to
      # win group-assignment precedence.
      #
      # Same-scope families (all dev, or all prod) are restricted to `major`.
      # Their minor/patch bumps are already kept in lockstep by the catch-all
      # dev-dependencies / production-dependencies group (one PR per scope), so
      # only majors — which fall outside those minor/patch groups — need a family
      # group to avoid being split into standalone per-package PRs. This keeps the
      # steady minor/patch stream consolidated instead of one PR per family.
      #
      # A family that crosses the dev/prod split (js-yaml) keeps ALL update types:
      # dev-dependencies and production-dependencies are separate PRs, so only the
      # family group holds its members together for minor/patch as well.
      vitest:
        # vitest core and @vitest/* (coverage) share one version line — a
        # coverage/core mismatch fails the suite. All-dev, so major only.
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - "major"
      eslint:
        # eslint + @eslint/js share a version line; typescript-eslint and globals
        # track the eslint major. All-dev, so major only.
        patterns:
          - "eslint"
          - "@eslint/js"
          - "typescript-eslint"
          - "globals"
        update-types:
          - "major"
      js-yaml:
        # @types/js-yaml tracks the js-yaml runtime major. Crosses dev/prod, so
        # keep ALL update types to hold runtime (prod) + types (dev) together.
        patterns:
          - "js-yaml"
          - "@types/js-yaml"
      # Split Prettier's major AND minor bumps into their own PR: a Prettier
      # version change can require reformatting even on a minor bump (see
      # trip-split#114), so it warrants isolated review. Patch bumps are trivial
      # and intentionally omitted here, so they fall through to the
      # dev-dependencies group and ride along with other minor/patch updates.
      # Listed first to win group-assignment precedence over the catch-all
      # dev-dependencies pattern.
      prettier:
        patterns:
          - "prettier"
        update-types:
          - "major"
          - "minor"
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Action bumps are low-risk and rarely need code changes, so group all of
    # them — major included — into a single PR.
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
