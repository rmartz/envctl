name: Package pins

# Runs only when dependency manifests change, so the pin check is scoped to PRs
# that actually update packages rather than every PR.
on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  package-pins:
    name: Package pins
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run check:package-pins
